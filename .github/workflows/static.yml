name: Deploy Vite Site

on:
  push:
    branches: ["main"] # Change to "master" if your branch is named master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Fix 1: Force node to clean its cache and allow all dev tools
      - name: Install All Dependencies
        run: |
          npm ci --include=dev || npm install --include=dev

      # Fix 2: Run the build command directly through npx to bypass shell issues
      - name: Build React Site
        run: npx vite build

      # Fix 3: List files so we can verify the 'dist' folder exists
      - name: Verify Build Folder
        run: ls -la

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
